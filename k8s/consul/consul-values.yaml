# k8s/consul/consul-values.yaml
# Consul Helm values for the RAG platform on OpenShift (CRC).
#
# Install (done by task setup:ocp / _deploy-infrastructure):
#   helm upgrade --install consul hashicorp/consul \
#     --namespace consul --create-namespace \
#     --values k8s/consul/consul-values.yaml --wait --timeout 5m
#
# Prerequisites (handled automatically by _deploy-infrastructure):
#   - anyuid SCC granted to system:serviceaccounts:consul
#   - consul-gossip-key Secret created in consul namespace
#   - Vault PKI mounts (connect_root, connect_inter) configured via configure-vault.sh

global:
  name: consul
  datacenter: dc1

  # docker.io prefix required on all images — without it OCP rewrites the registry
  # to registry.connect.redhat.com which does not carry these images.
  image: "docker.io/hashicorp/consul:1.21.5"
  imageK8S: "docker.io/hashicorp/consul-k8s-control-plane:1.8.11"
  imageConsulDataplane: "docker.io/hashicorp/consul-dataplane:1.8.11"
  imagePullPolicy: IfNotPresent

  # Required for OpenShift — configures SCCs and security contexts
  openshift:
    enabled: true

  tls:
    enabled: true
    verify: false   # CRC uses a self-signed internal CA

  acls:
    manageSystemACLs: true

  # Generated by _deploy-infrastructure (openssl rand -base64 32)
  gossipEncryption:
    secretName: consul-gossip-key
    secretKey: key

# ── Server ───────────────────────────────────────────────────────────────────
server:
  enabled: true
  replicas: 1
  bootstrapExpect: 1
  storage: 1Gi
  storageClass: ""   # use cluster default (crc-csi-hostpath-provisioner on CRC)

  service:
    type: ClusterIP

  # Vault PKI as the Connect CA.
  # configure-vault.sh creates connect_root and connect_inter before this chart
  # is installed, so the mounts are ready when the server starts.
  # All SPIFFE SVIDs are signed by Vault's connect_inter mount.
  extraConfig: |
    {
      "connect": {
        "ca_provider": "vault",
        "ca_config": {
          "address": "http://vault.vault.svc.cluster.local:8200",
          "token": "root",
          "root_pki_path": "connect_root",
          "intermediate_pki_path": "connect_inter",
          "leaf_cert_ttl": "72h",
          "private_key_type": "rsa",
          "private_key_bits": 2048
        }
      }
    }

# ── Connect Injection (service mesh / SPIFFE sidecars) ───────────────────────
connectInject:
  enabled: true
  default: false   # opt-in per-pod via annotation: consul.hashicorp.com/connect-inject: "true"

  transparentProxy:
    defaultEnabled: true
    defaultOverwriteProbes: true

  apiGateway:
    manageExternalCRDs: false
    managedGatewayClass:
      enabled: false

# ── CRD controller ───────────────────────────────────────────────────────────
controller:
  enabled: true

# ── UI ───────────────────────────────────────────────────────────────────────
ui:
  enabled: true
  service:
    type: ClusterIP   # exposed via port-forward (task setup:ocp) or an OCP Route

dns:
  enabled: true
  enableRedirection: true

syncCatalog:
  enabled: false
