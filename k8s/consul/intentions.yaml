---
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: query-service
  namespace: rag-platform
spec:
  destination:
    name: query-service
  sources:
  - name: ui
    action: allow
---
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: qdrant
  namespace: rag-platform
spec:
  destination:
    name: qdrant
  sources:
  - name: query-service
    action: allow
  - name: ingest
    action: allow
---
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: ollama
  namespace: rag-platform
spec:
  destination:
    name: ollama
  sources:
  - name: query-service
    action: allow
  - name: ingest
    action: allow
