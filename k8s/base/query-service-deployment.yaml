---
apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: rag-platform
  labels:
    app: query-service
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: query-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: rag-platform
  labels:
    app: query-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "query-service"
        consul.hashicorp.com/connect-service-port: "8000"
        consul.hashicorp.com/connect-service-upstreams: "qdrant:6333,ollama:11434"
    spec:
      securityContext:
        runAsNonRoot: true
        hostUsers: false
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: query-service
        image: image-registry.openshift-image-registry.svc:5000/rag-platform/query-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        # Consul Connect routes these through Envoy upstreams (mTLS enforced)
        - name: QDRANT_URL
          value: "http://localhost:6333"
        - name: OLLAMA_URL
          value: "http://localhost:11434"
        - name: EMBED_MODEL
          value: "nomic-embed-text"
        - name: LLM_MODEL
          value: "phi3"
        - name: COLLECTION
          value: "platform-docs"
        - name: TOP_K
          value: "5"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
