---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: rag-platform
  labels:
    app: ui
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8501
    targetPort: 8501
    protocol: TCP
  selector:
    app: ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: rag-platform
  labels:
    app: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "ui"
        consul.hashicorp.com/connect-service-port: "8501"
        consul.hashicorp.com/connect-service-upstreams: "query-service:8000"
    spec:
      securityContext:
        runAsNonRoot: true
        hostUsers: false
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ui
        image: image-registry.openshift-image-registry.svc:5000/rag-platform/ui:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8501
          protocol: TCP
        env:
        - name: API_URL
          value: "http://query-service.rag-platform.svc.cluster.local:8000"
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ui
  namespace: rag-platform
  labels:
    app: ui
spec:
  to:
    kind: Service
    name: ui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
