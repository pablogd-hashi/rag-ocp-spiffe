services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q nomic-embed-text"]
      interval: 5s
      timeout: 5s
      retries: 30

  ingest:
    build: ./ingest
    profiles: ["ingest"]
    environment:
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      EMBED_MODEL: "nomic-embed-text"
      COLLECTION: "platform-docs"
      DOCS_PATH: "/docs"
    volumes:
      - ./docs:/docs:ro
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy

  query-service:
    build: ./query-service
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"
      OLLAMA_URL: "http://ollama:11434"
      EMBED_MODEL: "nomic-embed-text"
      LLM_MODEL: "mistral"
      COLLECTION: "platform-docs"
      TOP_K: "5"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  ui:
    build: ./ui
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://query-service:8000"
    depends_on:
      query-service:
        condition: service_healthy

volumes:
  qdrant_data:
  ollama_data:
